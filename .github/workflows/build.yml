name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Show repo structure
        run: |
          echo "=== Repo root ==="
          find . -maxdepth 3 -type f | grep -v ".git" | sort

      - name: Find build.gradle location
        run: |
          echo "=== Finding build.gradle ==="
          find . -name "build.gradle" | grep -v ".git"
          echo "=== Finding settings.gradle ==="
          find . -name "settings.gradle" | grep -v ".git"

      - name: Build Debug APK
        run: |
          # build.gradle nerede?
          if [ -f "build.gradle" ]; then
            BUILD_DIR="."
          elif [ -f "NutriZekaApp/build.gradle" ]; then
            BUILD_DIR="NutriZekaApp"
          else
            echo "ERROR: build.gradle not found!"
            exit 1
          fi
          echo "Building from: $BUILD_DIR"
          cd "$BUILD_DIR"
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | grep -E "ERROR|error|FAILURE|warning|BUILD"

      - name: Find and upload APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "APK found: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NutriZeka-APK
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            NutriZekaApp/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
